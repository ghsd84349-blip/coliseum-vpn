<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coliseum VPN Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: 'Urbanist', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 40px;
            border: 2px solid #CCFF00;
            border-radius: 20px;
            background: #111114;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.2);
        }
        h1 {
            font-size: 48px;
            color: #CCFF00;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        p {
            font-size: 20px;
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: #CCFF00;
            color: #000000;
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(204, 255, 0, 0.4);
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(204, 255, 0, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coliseum VPN</h1>
        <p>Добро пожаловать в презентацию мобильного приложения Coliseum VPN. Проект разработан на фреймворке Flutter с использованием передовых протоколов шифрования WireGuard и кастомного неонового интерфейса киберспортивной арены.</p>
        <a href="https://dartpad.dev/embed-flutter.html?id=github.com/ghsd84349-blip/coliseum-vpn/blob/main/main.dart&theme=dark" class="btn" target="_blank">Запустить приложение</a>
    </div>
</body>
</html>
